<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="shortcut icon" th:href="@{/imgs/uni.ico}" type="image/x-icon">
  <title>Login Administrativo — II Tech Week 2026</title>
  <link rel="stylesheet" th:href="@{/css/style.css}" />
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
    }
 
    body {
      margin: 0;
      padding: 0;
      min-height: 100vh;
    }
 
    /* ── Card ── */
    .login-container {
      max-width: 400px;
      width: 90%;                          
      margin: 80px auto;
      padding: 40px;
      background: white;
      border-radius: 14px;
      border: 1px solid var(--borda);
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
      text-align: center;
    }
 
    .login-container img {
      width: 150px;
      max-width: 60%;                      
      margin-bottom: 20px;
    }
 
    /* ── Grupos de campo ── */
    .form-grupo {
      text-align: left;
      margin-bottom: 20px;
    }
 
    /* ── Inputs ── */
    .form-input {
      width: 100%;
      padding: 12px;
      border: 1.5px solid #005387;
      border-radius: 8px;
      margin-top: 5px;
      outline: none;
      font-size: 1rem;                     
      transition: border-color 0.2s ease, box-shadow 0.2s ease;
    }
 
    .form-input:focus {
      border-color: #FFD621;
      box-shadow: 0 0 0 3px rgba(255, 214, 33, 0.2);
    }
 
    /* ── Botão ── */
    .btn-login {
      width: 100%;
      padding: 14px;                       
      background: #005387;
      color: white;
      border: none;
      border-radius: 8px;
      font-weight: bold;
      font-size: 1rem;
      cursor: pointer;
      transition: background 0.2s ease, transform 0.2s ease;
    }
 
    .btn-login:hover {
      background: #00243B;
      transform: translateY(-2px);
    }
 
    .btn-login:active {
      transform: translateY(0);            
    }
 
    h2 { color: rgb(92, 88, 88); }
    p  { color: rgb(92, 88, 88); }
 
    .alerta-erro { color: rgb(187, 60, 60); }
 
    /* ── Tablet (≤ 480px) ── */
    @media (max-width: 480px) {
      .login-container {
        margin: 40px auto;                 
        padding: 28px 20px;               
      }
    }
 
    /* ── Mobile pequeno (≤ 360px) ── */
    @media (max-width: 360px) {
      .login-container {
        margin: 20px auto;
        padding: 24px 16px;
      }
 
      .form-input,
      .btn-login {
        font-size: 0.95rem;
      }
    }
  </style>
</head>

<body>

  <div class="login-container">

    <img th:src="@{/imgs/unicesumar-logo.png}" alt="Logo UniCesumar" />

    <h2>Acesso Restrito</h2>
    <p>Área da Organização</p>

    <div th:if="${param.erro}" class="alerta-erro">
      Usuário ou senha incorretos.
    </div>

    <div th:if="${param.logout}" class="alerta-erro"
      style="color:#6ef0c8;border-color:rgba(110,240,200,0.3);background:rgba(110,240,200,0.08);">
      Você saiu com sucesso.
    </div>

    <form th:action="@{/login}" method="post">

      <div class="form-grupo">
        <label for="username">Usuário</label>
        <input type="text" id="username" name="username" class="form-input" placeholder="Digite seu usuário" required
          autofocus />
      </div>

      <div class="form-grupo">
        <label for="password">Senha</label>
        <input type="password" id="password" name="password" class="form-input" placeholder="Digite sua senha"
          required />
      </div>

      <button type="submit" class="btn-login">Entrar no Painel</button>

    </form>
  </div>

</body>

</html>
