<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="shortcut icon" href="https://goqkmgbttahcutdhgqmv.supabase.co/storage/v1/object/public/imagens/uni.ico"
        type="image/x-icon">
    <title>404 — Página não encontrada | II Tech Week 2026</title>
    <link rel="stylesheet" th:href="@{/css/admin.css}">
</head>

<body>

    <header class="admin-header">
        <div class="header-inner">
            <div class="header-identidade">
                <a th:href="@{/admin/dashboard}">
                    <img src="https://goqkmgbttahcutdhgqmv.supabase.co/storage/v1/object/public/imagens/unicesumar-logo.png"
                        alt="Logo UniCesumar">
                </a>
            </div>
            <div>
                <nav>
                    <ul>
                        <li><a th:href="@{/admin/dashboard}">Dashboard</a></li>
                        <li><a th:href="@{/admin/participantes}">Participantes</a></li>
                        <li><a th:href="@{/admin/palestrantes}">Palestrantes</a></li>
                    </ul>
                </nav>
            </div>
        </div>
    </header>

    <main class="error-main">
        <div class="error-card">

            <p class="error-number">404</p>
            <div class="error-divider"></div>
            <p class="error-title">Página não encontrada</p>
            <p class="error-desc">
                O recurso que você está procurando não existe ou foi movido.<br>
                Verifique o endereço ou volte ao painel.
            </p>

            <a th:href="@{/admin/dashboard}" class="btn-home">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor"
                    stroke-width="2" width="16" height="16">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2
                   m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0
                   011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6" />
                </svg>
                Voltar ao Dashboard
            </a>

        </div>
    </main>

    <footer id="rodape-admin">
        <p>Painel administrativo — II Tech Week 2026</p>
    </footer>

</body>

</html>
