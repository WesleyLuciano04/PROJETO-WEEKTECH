<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta http-equiv='X-UA-Compatible' content='IE=edge'>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="shortcut icon" href="https://goqkmgbttahcutdhgqmv.supabase.co/storage/v1/object/public/imagens/uni.ico" type="image/x-icon">
    <title>Inscrição Palestrante — Tech Week 2026</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>

<body>

    <header class="cabecalho-participante">
        <div class="header-inner">
            <div class="header-identidade">
                <a href="https://www.unicesumar.edu.br/" target="_blank">
                    <img src="https://goqkmgbttahcutdhgqmv.supabase.co/storage/v1/object/public/imagens/unicesumar-logo.png" alt="Logo UniCesumar">
                </a>
            </div>
            <nav class="navegacao">
                <a th:href="@{/}">Home</a>
                <a th:href="@{/inscricao-participante}">Participante</a>
                <a th:href="@{/inscricao-palestrante}">Palestrante</a>
                <button onclick="modoEscuro()" class="btn-tema" id="btn-tema" aria-label="Alternar tema escuro">
                    <svg id="icon-tema" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24"
                        fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
                        aria-hidden="true">
                        <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
                    </svg>
                </button>
            </nav>
        </div>
    </header>

    <main id="conteudo-palestrante">

        <div class="capa-participante">
            <section id="introducao-palestrante">
                <h2>Inscrição para Palestrante</h2>
                <p>Envie sua proposta de palestra para a Tech Week 2026.</p>
            </section>
            <a th:href="@{/}">
                <img id="img-participante" src="https://goqkmgbttahcutdhgqmv.supabase.co/storage/v1/object/public/imagens/logotw1.png" alt="Logo do evento: Tech Week 2026">
            </a>
        </div>

        <section id="form-palestrante">
            <h2>Formulário de Palestra</h2>

            <!-- Mensagens vindas do back-end -->
            <div th:if="${sucesso}" class="alerta alerta-sucesso" th:text="${sucesso}"></div>
            <div th:if="${erro}"    class="alerta alerta-erro"    th:text="${erro}"></div>

            <form method="POST"
                  th:action="@{/inscricao-palestrante}"
                  th:object="${palestranteDTO}"
                  enctype="multipart/form-data"
                  id="form-inscricao-palestrante">

                <fieldset>
                    <legend>Dados Pessoais</legend>

                    <div class="campo">
                        <label>Nome completo *</label>
                        <input type="text"
                               id="palestrante-nome"
                               th:field="*{nome}"
                               placeholder="Digite seu nome completo">
                        <span class="mensagem-erro"
                              th:if="${#fields.hasErrors('nome')}"
                              th:errors="*{nome}"></span>
                    </div>

                    <div class="campo">
                        <label>Telefone *</label>
                        <input type="tel"
                               id="palestrante-telefone"
                               th:field="*{telefone}"
                               placeholder="(43) 99999-9999">
                        <span class="mensagem-erro"
                              th:if="${#fields.hasErrors('telefone')}"
                              th:errors="*{telefone}"></span>
                    </div>

                    <div class="campo">
                        <label>E-mail *</label>
                        <input type="email"
                               id="palestrante-email"
                               th:field="*{email}"
                               placeholder="seuemail@gmail.com">
                        <span class="mensagem-erro"
                              th:if="${#fields.hasErrors('email')}"
                              th:errors="*{email}"></span>
                    </div>
                </fieldset>

                <fieldset>
                    <legend>Dados da Palestra</legend>

                    <div class="campo">
                        <label>Tema da Palestra *</label>
                        <input type="text"
                               id="palestrante-tema"
                               th:field="*{temaPalestra}"
                               placeholder="Ex: IA na pratica">
                        <span class="mensagem-erro"
                              th:if="${#fields.hasErrors('temaPalestra')}"
                              th:errors="*{temaPalestra}"></span>
                    </div>

                    <div class="campo">
                        <label>Briefing *</label>
                        <textarea id="palestrante-briefing"
                                  th:field="*{briefing}"
                                  placeholder="Escreva os objetivos da palestra"></textarea>
                        <span class="mensagem-erro"
                              th:if="${#fields.hasErrors('briefing')}"
                              th:errors="*{briefing}"></span>
                    </div>
                </fieldset>

                <fieldset>
                    <legend>Currículo</legend>

                    <div class="campo">
                        <label>Mini Currículo *</label>
                        <textarea id="palestrante-curriculo-resumo"
                                  th:field="*{curriculoResumo}"
                                  placeholder="Descreve brevemente sua trajetória"></textarea>
                        <span class="mensagem-erro"
                              th:if="${#fields.hasErrors('curriculoResumo')}"
                              th:errors="*{curriculoResumo}"></span>
                    </div>

                    <div class="campo campo--coluna">
                        <label>Arquivo (opcional)</label>
                        <!-- input file não suporta th:field — usar name diretamente -->
                        <input type="file"
                               id="palestrante-curriculo-arquivo"
                               name="curriculoArquivo"
                               accept=".pdf,.doc,.docx">
                    </div>
                </fieldset>

                <fieldset>
                    <legend>Confirmação</legend>

                    <div class="campo-checkbox">
                        <input type="checkbox"
                               id="palestrante-autoriza-divulgacao"
                               th:field="*{autorizaDivulgacao}"
                               value="true">
                        <label class="label-checkbox">Autorizo a divulgação dos meus dados</label>
                        <span class="mensagem-erro"
                              th:if="${#fields.hasErrors('autorizaDivulgacao')}"
                              th:errors="*{autorizaDivulgacao}"></span>
                    </div>
                </fieldset>

                <div class="acoes-formulario">
                    <button class="btnEnviar blockClick" type="submit" data-texto="Enviar">Enviar</button>
                    <button class="btnLimpar" type="reset">Limpar</button>
                </div>

            </form>
        </section>

    </main>

    <footer role="contentinfo" class="rodape-pp">
        <div>
            <a href="https://api.whatsapp.com/send?phone=554491399006&amp;text=Ol%C3%A1!%20Acessei%20o%20site%20da%20UniCesumar%20e%20quero%20saber%20mais%20informa%C3%A7%C3%B5es.%20Voc%C3%AA%20pode%20ajudar?"
               target="_blank">
                <img src="https://goqkmgbttahcutdhgqmv.supabase.co/storage/v1/object/public/imagens/iconWhats.png" alt="ícone whatsapp">
            </a>
        </div>
        <p>Organização: Comissão da Tech Week 2026</p>
    </footer>

    <script th:src="@{/js/main.js}"></script>
    <script th:src="@{/js/blockClick.js}"></script>
</body>

</html>
