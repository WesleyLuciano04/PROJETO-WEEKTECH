<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="shortcut icon" href="https://goqkmgbttahcutdhgqmv.supabase.co/storage/v1/object/public/imagens/uni.ico" type="image/x-icon">
    <title>Palestrantes — Admin II Tech Week 2026</title>
    <link rel="stylesheet" th:href="@{/css/admin.css}">
</head>

<body>

    <header class="admin-header">
        <div class="header-inner">
            <div class="header-identidade">
                <a th:href="@{/admin/dashboard}">
                    <img src="https://goqkmgbttahcutdhgqmv.supabase.co/storage/v1/object/public/imagens/unicesumar-logo.png" alt="Logo UniCesumar">
                </a>
            </div>
            <div>
                <nav>
                    <ul>
                        <li><a th:href="@{/admin/dashboard}">Dashboard</a></li>
                        <li><a th:href="@{/admin/participantes}">Participantes</a></li>
                        <li><a th:href="@{/admin/palestrantes}" class="ativo">Palestrantes</a></li>
                    </ul>
                </nav>
            </div>
        </div>
    </header>

    <main id="conteudo-admin">

        <section class="admin-page-header">
            <h1>Palestrantes</h1>
            <p>Gerencie as propostas de palestras.</p>
        </section>

        <!-- FILTRO CARDS -->
        <section class="filtro-cards" id="filtro-palestrantes">

            <div class="filtro-card ativo" data-filtro="">
                <div class="stat-icon">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                        stroke-width="2" width="20" height="20">
                        <path d="M12 19v3" />
                        <path d="M19 10v2a7 7 0 0 1-14 0v-2" />
                        <rect x="9" y="2" width="6" height="13" rx="3" />
                    </svg>
                </div>
                <p class="filtro-number">Total</p>
                <p class="filtro-label">Todos</p>
            </div>

            <div class="filtro-card" data-filtro="PENDENTE">
                <div class="stat-icon stat-icon--yellow">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                        stroke-width="2" width="20" height="20">
                        <circle cx="12" cy="12" r="10" />
                        <path d="M12 6v6l4 2" />
                    </svg>
                </div>
                <p class="filtro-number">Pendente</p>
                <p class="filtro-label">Pendentes</p>
            </div>

            <div class="filtro-card" data-filtro="APROVADO">
                <div class="stat-icon stat-icon--green">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                        stroke-width="2" width="20" height="20">
                        <circle cx="12" cy="12" r="10" />
                        <path d="m9 12 2 2 4-4" />
                    </svg>
                </div>
                <p class="filtro-number">Aprovado</p>
                <p class="filtro-label">Aprovados</p>
            </div>

            <div class="filtro-card" data-filtro="REPROVADO">
                <div class="stat-icon stat-icon--red">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                        stroke-width="2" width="20" height="20">
                        <circle cx="12" cy="12" r="10" />
                        <line x1="15" y1="9" x2="9" y2="15" />
                        <line x1="9" y1="9" x2="15" y2="15" />
                    </svg>
                </div>
                <p class="filtro-number">Reprovado</p>
                <p class="filtro-label">Reprovados</p>
            </div>

        </section>

        <!-- BUSCA (client-side, mantém comportamento original do admin.js) -->
        <section>
            <div class="busca-wrapper">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                    stroke-width="2" width="16" height="16">
                    <circle cx="11" cy="11" r="8" />
                    <line x1="21" y1="21" x2="16.65" y2="16.65" />
                </svg>
                <input type="text" id="busca-input-palestrante" placeholder="Buscar por nome ou tema...">
            </div>
        </section>

        <!-- TABELA -->
        <section>
            <div class="table-wrapper" style="overflow-x: auto;">
                <table id="tabela-palestrantes">
                    <thead>
                        <tr>
                            <th>Nome</th>
                            <th>Email</th>
                            <th>Tema</th>
                            <th>Status</th>
                            <th>Ações</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="p : ${palestrantes}"
                            th:attr="data-status=${#strings.toUpperCase(p.status.name())}">
                            <td th:text="${p.nome}"></td>
                            <td th:text="${p.email}"></td>
                            <td th:text="${p.temaPalestra}"></td>
                            <td>
                                <span class="badge" th:text="${p.status}" th:classappend="${p.status.name() == 'PENDENTE'} ? 'badge--pendente' :
                                  (${p.status.name() == 'APROVADO'} ? 'badge--aprovado' : 'badge--reprovado')">
                                </span>
                            </td>
                            <td>
                                <a th:href="@{/admin/palestrantes/{id}(id=${p.id})}" class="btn-ver">👁 Ver</a>
                            </td>
                        </tr>
                        <tr th:if="${palestrantes.isEmpty()}">
                            <td colspan="7" style="text-align:center;">Nenhum palestrante encontrado.</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </section>

    </main>

    <footer id="rodape-admin">
        <p>Painel administrativo — II Tech Week 2026</p>
    </footer>

    <script th:src="@{/js/admin.js}"></script>
</body>

</html>
