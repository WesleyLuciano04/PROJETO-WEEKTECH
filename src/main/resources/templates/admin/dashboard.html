<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard — Administração II Tech Week 2026</title>
  <link rel="stylesheet" th:href="@{/css/admin.css}">
</head>

<body>

  <header class="admin-header">
    <div class="header-inner">
      <div class="header-identidade">
        <a th:href="@{/admin/dashboard}">
          <img th:src="@{/imgs/unicesumar-logo.png}" alt="Logo UniCesumar">
        </a>
      </div>
      <div>
        <nav>
          <ul>
            <li><a th:href="@{/admin/dashboard}" class="ativo">Dashboard</a></li>
            <li><a th:href="@{/admin/participantes}">Participantes</a></li>
            <li><a th:href="@{/admin/palestrantes}">Palestrantes</a></li>
          </ul>
        </nav>
      </div>
    </div>
  </header>

  <main id="conteudo-admin">

    <section class="admin-page-header">
      <h1 id="titulo-Dashboard">Dashboard</h1>
      <p>Resumo das inscrições da II Tech Week 2026.</p>
    </section>

    <!-- PARTICIPANTES -->
    <section id="participantes-admin">
      <h2>
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="#00243B" stroke-width="2" width="18" height="18">
          <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/>
          <circle cx="9" cy="7" r="4"/>
          <path d="M23 21v-2a4 4 0 0 0-3-3.87"/>
          <path d="M16 3.13a4 4 0 0 1 0 7.75"/>
        </svg>
        Participantes
      </h2>

      <div class="stats-grid participantes-grid">

        <div class="stat-card">
          <div>
            <p class="stat-label">Total Inscritos</p>
            <p class="stat-number" th:text="${dashboard.totalParticipantes}">0</p>
          </div>
        </div>

        <div class="stat-card">
          <div>
            <p class="stat-label">Coffee Break</p>
            <p class="stat-number" th:text="${dashboard.participantesComCoffeeBreak}">0</p>
          </div>
        </div>

        <div class="stat-card">
          <div>
            <p class="stat-label">Com Projeto</p>
            <p class="stat-number" th:text="${dashboard.participantesComProjeto}">0</p>
          </div>
        </div>

      </div>
    </section>

    <!-- PALESTRANTES -->
    <section id="palestrantes-admin">
      <h2>
        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#00243B" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 19v3"/>
          <path d="M19 10v2a7 7 0 0 1-14 0v-2"/>
          <rect x="9" y="2" width="6" height="13" rx="3"/>
        </svg>
        Palestrantes
      </h2>

      <div class="stats-grid palestrantes-grid">

        <div class="stat-card">
          <div class="stat-icon">
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M6 22a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h8a2.4 2.4 0 0 1 1.704.706l3.588 3.588A2.4 2.4 0 0 1 20 8v12a2 2 0 0 1-2 2z"/>
              <path d="M14 2v5a1 1 0 0 0 1 1h5"/>
              <path d="M16 22a4 4 0 0 0-8 0"/>
              <circle cx="12" cy="15" r="3"/>
            </svg>
          </div>
          <p class="stat-number" th:text="${dashboard.totalPalestrantes}">0</p>
          <p class="stat-label">Propostas</p>
        </div>

        <div class="stat-card">
          <div class="stat-icon">
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="12" cy="12" r="10"/>
              <path d="M12 6v6l4 2"/>
            </svg>
          </div>
          <p class="stat-number" th:text="${dashboard.palestrantesPendentes}">0</p>
          <p class="stat-label">Pendentes</p>
        </div>

        <div class="stat-card">
          <div class="stat-icon">
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="12" cy="12" r="10"/>
              <path d="m9 12 2 2 4-4"/>
            </svg>
          </div>
          <p class="stat-number" th:text="${dashboard.palestrantesAprovados}">0</p>
          <p class="stat-label">Aprovados</p>
        </div>

        <div class="stat-card">
          <div class="stat-icon">
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="12" cy="12" r="10"/>
              <path d="M4.929 4.929 19.07 19.071"/>
            </svg>
          </div>
          <p class="stat-number" th:text="${dashboard.palestrantesReprovados}">0</p>
          <p class="stat-label">Reprovados</p>
        </div>

      </div>
    </section>

  </main>

  <footer id="rodape-admin">
    <p>Painel administrativo — II Tech Week 2026</p>
  </footer>

</body>

</html>
