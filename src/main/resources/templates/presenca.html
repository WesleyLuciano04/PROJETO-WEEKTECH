<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="shortcut icon" href="https://goqkmgbttahcutdhgqmv.supabase.co/storage/v1/object/public/imagens/uni.ico" type="image/x-icon">
    <title>Confirmar Presença</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', sans-serif;
            background: radial-gradient(ellipse at center, #ffffff 0%, #a8caff 30%, #1a5fd4 65%, #0a2d8a 100%);
        }

        .card {
            background: transparent;
            text-align: center;
            padding: 2rem;
            width: 100%;
            max-width: 420px;
        }

        label {
            display: block;
            font-size: 1rem;
            color: #1a1a2e;
            margin-bottom: 1rem;
            font-weight: 500;
        }

        input[type="text"] {
            width: 100%;
            padding: 0.85rem 1.2rem;
            border: 1.5px solid #ccd9f0;
            border-radius: 8px;
            font-size: 1rem;
            color: #333;
            background: #fff;
            outline: none;
            margin-bottom: 1rem;
            transition: border-color 0.2s;
        }

        input[type="text"]:focus {
            border-color: #1a5fd4;
        }

        button {
            width: 100%;
            padding: 0.9rem;
            background: #1a5fd4;
            color: #fff;
            font-size: 0.95rem;
            font-weight: 700;
            letter-spacing: 0.08em;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: background 0.2s;
        }

        button:hover {
            background: #1449aa;
        }

        .mensagem {
            margin-top: 1rem;
            padding: 0.75rem 1rem;
            border-radius: 8px;
            font-size: 0.95rem;
            font-weight: 500;
        }

        .sucesso {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }

        .erro {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }

        .estrela {
            position: fixed;
            bottom: 1.5rem;
            right: 1.5rem;
            font-size: 1.4rem;
            color: rgba(255,255,255,0.5);
        }
    </style>
</head>
<body>

    <div class="card">
        <label>Digite seu RA para confirmarmos a sua presença:</label>

        <form th:action="@{/inscricao-participante/registrar}" method="post">
            <input
                type="text"
                name="ra"
                placeholder="Ex: 12345678"
                required
                autofocus
            />
            <button type="submit">CONFIRMAR PRESENÇA</button>
        </form>

        <div class="mensagem sucesso" th:if="${sucesso}" th:text="${sucesso}"></div>

        <div class="mensagem erro" th:if="${erro}" th:text="${erro}"></div>
    </div>

</body>
</html>
