<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta http-equiv='X-UA-Compatible' content='IE=edge'>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inscrição Palestrante — Tech Week 2026</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <header class="cabecalho-participante">
        <div class="header-inner">
            <div class="header-identidade">
                <a href="https://www.unicesumar.edu.br/" target="_blank">
                    <img src="imgs/unicesumar-logo.png" alt="Logo UniCesumar">
                </a>   
            </div>
            <!-- Navegação -->
            <nav class="navegacao">
                <a href="index.html">Home</a>
                <a href="inscricao-participante.html">Participante</a>
                <a href="inscricao-palestrante.html">Palestrante</a>
                <a href="#contato">Contato</a>
                <button onclick="modoEscuro()" class="btn-tema" id="btn-tema" aria-label="Alternar tema escuro">
                    <svg id="icon-tema" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24"
                        fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
                        aria-hidden="true">
                        <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
                    </svg>
                </button>    
            </nav>
        </div>
    </header>

    <main id="conteudo-palestrante">
        <div class="capa-participante">
            <section id="introducao-palestrante">
                <h2>Inscrição para Palestrante</h2>
                <p>Envie sua proposta de palestra para a Tech Week 2026.</p>
            </section>

                <a href="index.html">
                    <img id="img-participante" src="imgs/logotw1.png" alt="Logo do evento: Tech Week 2026">
                </a>
        </div>

        <section id="form-palestrante">
            <h2>Formulário de Palestra</h2>

            <form method="POST" action="#" id="form-inscricao-palestrante">

                <fieldset>
                    <legend>Dados Pessoais</legend>

                    <div class="campo">
                        <label>Nome completo *</label>
                        <input type="text" id="palestrante-nome" placeholder="Digite seu nome completo">
                    </div>

                    <div class="campo">
                        <label>Telefone *</label>
                        <input type="tel" id="palestrante-telefone" placeholder="(43 99999-9999)">
                    </div>

                    <div class="campo">
                        <label>E-mail *</label>
                        <input type="email" id="palestrante-email" placeholder="seuemail@gmail.com">
                    </div>

                </fieldset>

                <fieldset>
                    <legend>Dados da Palestra</legend>

                    <div class="campo">
                        <label>Tema da Palestra *</label>
                        <input type="text" id="palestrante-tema" placeholder="Ex: IA na pratica">
                    </div>

                    <div class="campo">
                        <label>Briefing *</label>
                        <textarea id="palestrante-briefing" placeholder="Escreva os objetivos da palestra"></textarea>
                    </div>

                </fieldset>

                <fieldset>
                    <legend>Currículo</legend>

                    <div class="campo">
                        <label>Mini Currículo *</label>
                        <textarea id="palestrante-curriculo-resumo" placeholder="Descreve brevemente sua trajetória"></textarea>
                    </div>

                    <div class="campo campo--coluna">
                        <label>Arquivo (opcional)</label>
                        <input type="file" id="palestrante-curriculo-arquivo">
                    </div>

                </fieldset>

                <fieldset>
                    <legend>Confirmação</legend>

                    <div class="campo-checkbox">
                        <input type="checkbox" id="palestrante-autoriza-divulgacao">
                        <label class="label-checkbox">Autorizo a divulgação dos meus dados</label>
                    </div>
                </fieldset>

                <div class="acoes-formulario">
                    <button class="btnEnviar" type="submit">Enviar</button>
                    <button class="btnLimpar" type="reset">Limpar</button>
                </div>

            </form>
        </section>

    </main>

    <footer role="contentinfo" class="rodape-pp">
            <div>
                <a href="https://api.whatsapp.com/send?phone=554491399006&amp;text=Ol%C3%A1!%20Acessei%20o%20site%20da%20UniCesumar%20e%20quero%20saber%20mais%20informa%C3%A7%C3%B5es.%20Voc%C3%AA%20pode%20ajudar?"
                    target="_blank"><img src="imgs/iconWhats.png" alt="">
                </a>
            </div>
            <p>Organização: Comissão da Tech Week 2026</p>
    </footer>
  
    <script src="main.js"></script>
    <script src="valida-palestrante.js"></script>
</body>

</html>
