<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inscrição Participante — Tech Week 2026</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <header>
        <div class="header-inner">
            <div class="header-identidade">
                <a href="index.html">
                    <img src="imgs/logoUnicesumar/logo.jpg" alt="Logo">
                </a>

                <div class="header-titulos">
                    <h1>II Tech Week 2026</h1>
                    <p>Inteligência Artificial em Ação</p>
                </div>
            </div>

            <nav class="navegacao-principal">
                <ul>
                    <li><a href="index.html">Home</a></li>
                    <li><a href="inscricao-participante.html">Participante</a></li>
                    <li><a href="inscricao-palestrante.html">Palestrante</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <main id="conteudo-principal">

        <section id="introducao-Participante">
            <h2>Inscrição de Participantes</h2>
            <p>Preencha o formulário para participar da Tech Week 2026.</p>
        </section>

        <section id="form-Participante">
            <h2>Formulário</h2>

            <form method="POST" id="form-inscricao-participante">

                <fieldset>
                    <legend>Dados Pessoais</legend>

                    <div class="campo">
                        <label>
                            Nome completo *
                            <input type="text" id="participante-nome" 
                            placeholder="Digite seu nome completo" required>
                        </label>
                    </div>

                    <div class="campo">
                        <label>
                            RA *
                            <input type="text" id="participante-ra" 
                            placeholder="Ex: 00000000-2"required>
                        </label>
                    </div>

                    <div class="campo">
                        <label>
                            Curso *
                            <select id="participante-curso" required>
                                <option>Selecione</option>
                                <option>ADS</option>
                                <option>Engenharia de Software</option>
                            </select>
                        </label>
                    </div>

                    <div class="campo">
                        <label>
                            Semestre *
                            <select id="participante-serie" required>
                                <option>Selecione</option>
                                <option>1</option>
                                <option>2</option>
                                <option>3</option>
                                <option>4</option>
                                <option>5</option>
                                <option>6</option>
                            </select>
                        </label>
                    </div>

                </fieldset>

                <fieldset id="secao-projeto">
                    <legend>Projeto</legend>

                    <div class="campo">
                        <label>
                            <input type="checkbox" id="tem-projeto">
                            Quero apresentar um projeto
                        </label>
                    </div>

                    <div id="dados-projeto">

                        <div class="campo">
                            <label>
                                Nome do Projeto
                                <input type="text" placeholder="Ex: IA na pratica"id="projeto-nome">
                            </label>
                        </div>

                        <div class="campo">
                            <label>
                                Descrição
                                <textarea id="projeto-descricao" placeholder="Pequena descrição do projeto"></textarea>
                            </label>
                        </div>

                    </div>
                </fieldset>

                <fieldset id="secao-coffee-break">
                    <legend>Coffee Break</legend>

                    <div class="campo">
                        <label>
                            <input type="checkbox" id="coffee-break">
                            Participar do coffee break
                        </label>
                    </div>

                    <div id="info-coffee-break"></div>
                </fieldset>

                <div class="acoes-formulario">
                    <button type="submit">Enviar</button>
                    <button type="reset">Limpar</button>
                </div>

            </form>
        </section>

    </main>

    <footer role="contentinfo">
        <address>
            <p>Organização: Comissão da Tech Week 2026</p>
            <p>
                Contato:
                <a href="https://api.whatsapp.com/send?phone=554491399006&amp;text=Ol%C3%A1!%20Acessei%20o%20site%20da%20UniCesumar%20e%20quero%20saber%20mais%20informa%C3%A7%C3%B5es.%20Voc%C3%AA%20pode%20ajudar?"
                    target="_blank" ><i>WhatsApp</i></a>
            </p>
        </address>
    </footer>

</body>

</html>
