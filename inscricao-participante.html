<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta http-equiv='X-UA-Compatible' content='IE=edge'>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inscrição Participante — Tech Week 2026</title>
    <link rel="stylesheet" href="style.css">
</head>

<body class="participante-tela">

    <header class="cabecalho-participante">
        <div class="header-inner">
            <div class="header-identidade">
                <a href="https://www.unicesumar.edu.br/" target="_blank">
                    <img src="imgs/unicesumar-logo.png" alt="Logo UniCesumar">
                </a>   
            </div>
            <!-- Navegação -->
            <nav class="navegacao">
                <a href="index.html">Home</a>
                <a href="inscricao-participante.html">Participante</a>
                <a href="inscricao-palestrante.html">Palestrante</a>
            </nav>
        </div>
    </header>

    <main id="conteudo-participante">
        <div class="capa-participante">
            <section id="introducao-participante">
                <h2>Inscrição de Participantes</h2>
                <p>Preencha o formulário para participar da Tech Week 2026.</p>
            </section>

                <a href="index.html">
                    <img id="img-participante" src="imgs/logotw1.png" alt="Logo do evento: Tech Week 2026">
                </a>
        </div>

        <section id="form-participante">
            <h2>Formulário</h2>

            <form method="POST" id="form-inscricao-participante">

                <fieldset>
                    <legend>Dados Pessoais</legend>

                    <div class="campo">
                        <label>Nome completo *</label>
                        <input type="text" id="participante-nome" placeholder="Digite seu nome completo">
                    </div>

                    <div class="campo">
                        <label>RA *</label>
                        <input type="text" id="participante-ra" placeholder="Ex: 00000000-2">
                    </div>

                    <div class="campo">
                        <label>Curso *</label>
                        <select id="participante-curso">
                                <option value="">Selecione</option>
                                <option>ADS</option>
                                <option>Engenharia de Software</option>
                        </select>
                    </div>

                    <div class="campo">
                        <label>Semestre *</label>
                        <select id="participante-serie">
                                <option value="">Selecione</option>
                                <option>1°</option>
                                <option>2°</option>
                                <option>3°</option>
                                <option>4°</option>
                                <option>5°</option>
                                <option>6°</option>
                                <option>7°</option>
                                <option>8°</option>
                        </select>
                    </div>

                </fieldset>
                
                <fieldset id="secao-projeto">
                    <legend>Projeto</legend>

                    <div class="campo-checkbox">
                        <input type="checkbox" id="tem-projeto">
                        <label class="label-checkbox">Quero apresentar um projeto</label>
                    </div>

                    <div id="dados-projeto">

                        <div class="campo">
                            <label>Nome do Projeto</label>
                            <input type="text" placeholder="Ex: IA na pratica" id="projeto-nome">
                        </div>

                        <div class="campo">
                            <label>Descrição</label>
                            <textarea id="projeto-descricao" placeholder="Pequena descrição do projeto"></textarea>
                        </div>

                    </div>
                </fieldset>

                <fieldset id="secao-coffee-break">
                    <legend>Coffee Break</legend>

                    <div class="campo-checkbox">
                        <input type="checkbox" id="coffee-break">
                        <label class="label-checkbox">Participar do coffee break</label>
                    </div>

                    <div id="info-coffee-break"></div>
                </fieldset>

                <div class="acoes-formulario">
                    <button class="btnEnviar" type="submit">Enviar</button>
                    <button class="btnLimpar" type="reset">Limpar</button>
                </div>

            </form>
        </section>

    </main>

    <footer role="contentinfo" class="rodape-pp">
            <div>
                <a href="https://api.whatsapp.com/send?phone=554491399006&amp;text=Ol%C3%A1!%20Acessei%20o%20site%20da%20UniCesumar%20e%20quero%20saber%20mais%20informa%C3%A7%C3%B5es.%20Voc%C3%AA%20pode%20ajudar?"
                    target="_blank"><img src="imgs/iconWhats.png" alt="">
                </a>
            </div>
            <p>Organização: Comissão da Tech Week 2026</p>
    </footer>

    <script src="main.js"></script>
</body>

</html>
